<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="auth auth--register">
<main class="auth-page">
    <div class="auth-card" id="authCard">

        <div class="slide-panel" aria-hidden="true"></div>

        <div class="content">
            <div class="text-center mb-2">
                <img class="logo mb-2" src="/images/chatapp.png" alt="ChatApp logo">
            </div>

            <div id="timeRemaining" class="text-center small text-success mb-2 d-none">
                Time remaining: <span id="timeRemainingValue">30</span> seconds
            </div>

            <!-- STEP 1 -->
            <section id="step1" class="w-100">
                <h2 class="title text-center">Please Register</h2>

                <div class="auth-wrap">
                    <form id="formStep1" class="w-100" novalidate>
                        <div id="errStep1" class="text-danger small text-center mb-2"></div>

                        <input type="email" id="regEmail" name="email" class="form-control mb-2"
                               placeholder="Email address" maxlength="32" required
                               autocomplete="email">

                        <input type="text" id="regFirstName" name="firstName" class="form-control mb-2"
                               placeholder="First Name" minlength="3" maxlength="32"
                               pattern="^[A-Za-z]+$" required
                               autocomplete="given-name">

                        <input type="text" id="regLastName" name="lastName" class="form-control mb-3"
                               placeholder="Last Name" minlength="3" maxlength="32"
                               pattern="^[A-Za-z]+$" required
                               autocomplete="family-name">

                        <button id="btnNext" type="button" class="btn btn-primary w-100">Next</button>
                    </form>
                </div>
            </section>

            <!-- STEP 2 -->
            <section id="step2" class="w-100 d-none">
                <h2 class="title text-center">Please choose a password</h2>

                <div class="auth-wrap">
                    <form id="formStep2" class="w-100" novalidate>
                        <div id="errStep2" class="text-danger small text-center mb-2"></div>

                        <input type="password" id="regPassword" name="password" class="form-control mb-2"
                               placeholder="Password" minlength="3" maxlength="32" required
                               autocomplete="new-password">

                        <input type="password" id="regConfirmPassword" name="confirmPassword" class="form-control mb-3"
                               placeholder="Confirm Password" minlength="3" maxlength="32" required
                               autocomplete="new-password">

                        <div class="d-flex gap-2">
                            <button id="btnBack" type="button" class="btn btn-outline-secondary w-50">Back</button>
                            <button id="btnRegister" type="button" class="btn btn-primary w-50">Register</button>
                        </div>
                    </form>
                </div>
            </section>

            <div class="text-center mt-4 auth-foot">
                <div class="text-muted mb-2">© SK</div>
                <div class="text-muted">
                    Already registered? go to <a id="goLogin" href="/">login</a> page
                </div>
            </div>
        </div>

    </div>
</main>

<script src="/js/validators-client.js"></script>
<script src="/js/register.js"></script>
</body>
</html>
