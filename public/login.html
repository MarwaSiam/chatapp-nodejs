<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="auth auth--login">
<main class="auth-page">

    <section class="auth-card" id="authCard">

        <div class="slide-panel" aria-hidden="true"></div>

        <div class="content">
            <div class="text-center mb-4">
                <img class="logo mb-2" src="/images/chatapp.png" alt="ChatApp logo">
            </div>

            <h2 class="title text-center">Please sign in</h2>
            <div class="subtitle text-center">Exercise 5 (part 1: registration)</div>

            <div id="regSuccess" class="text-success small text-center mb-2 d-none">
                You are now registered!
            </div>

            <div class="auth-wrap">
                <form class="w-100" onsubmit="return false;">
                    <input type="email" id="email" name="email" class="form-control mb-2"
                           placeholder="Email address" maxlength="32" required
                           autocomplete="email">

                    <input type="password" id="password" name="password" class="form-control mb-3"
                           placeholder="Password" minlength="3" maxlength="32" required
                           autocomplete="current-password">

                    <button type="submit" class="btn btn-primary w-100">Sign in</button>
                </form>
            </div>

            <div class="text-center mt-4 auth-foot">
                <div class="text-muted mb-2">© SK</div>
                <div class="text-muted">
                    Need to <a id="goRegister" href="/register">register?</a>
                </div>
            </div>
        </div>

    </section>
</main>

<script src="/js/validators-client.js"></script>
<script src="/js/login.js"></script>
</body>
</html>
